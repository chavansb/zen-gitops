# ─── secret.yaml ─────────────────────────────────────────────────────────────
# IMPORTANT: This file is a TEMPLATE only
# Do NOT put your real API key here
# Apply the secret manually with your real key:
#
# kubectl create secret generic fluent-bit-elastic-credentials \
#   --namespace dev \
#   --from-literal=api_key='YOUR_BASE64_ENCODED_API_KEY'
#
# This secret is NOT managed by ArgoCD — create it manually once per cluster
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fluent-bit-elastic-credentials
  namespace: dev
  annotations:
    # Reminder: apply this manually, not via ArgoCD
    note: "Apply manually with real API key"
type: Opaque
stringData:
  api_key: REPLACE_WITH_YOUR_ELASTIC_API_KEY
