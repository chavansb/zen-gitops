replicaCount: 1
fullnameOverride: qc-service
image:
  repository: 430970051789.dkr.ecr.us-east-1.amazonaws.com/qc-service
  tag: sha-00baf76
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8086
  targetPort: 8086
ingress:
  enabled: false
  className: nginx
  host: dev.pharma.internal
  path: /qc
  pathType: Prefix
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
livenessProbe:
  path: /actuator/health
  port: 8086
  initialDelaySeconds: 50
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  path: /actuator/health/readiness
  port: 8086
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
configmap:
  SPRING_PROFILES_ACTIVE: dev
  LOG_LEVEL: DEBUG
  SERVER_PORT: "8086"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4318
  OTEL_SERVICE_NAME: auth-service
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
volumeMounts:
  - name: tmp
    mountPath: /tmp
volumes:
  - name: tmp
    emptyDir: {}
serviceAccount:
  create: true
  annotations: {}
  name: qc-service
