apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qc-service-qa              # ← dev → qa
  namespace: argocd
  labels:
    env: qa                        # ← dev → qa
    app: qc-service
    managed-by: terraform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: pharma
  source:
    repoURL: https://github.com/chavansb/zen-gitops.git
    targetRevision: HEAD
    path: helm-charts
    helm:
      valueFiles:
        - ../envs/qa/values-qc-service.yaml   # ← dev → qa

  destination:
    server: https://A93BEADC50249F768742E7A35CD4FE46.sk1.us-east-1.eks.amazonaws.com   # ← NOT kubernetes.default.svc!
    # This is the QA cluster API endpoint
    # Get it after terraform apply qa:
    # aws eks describe-cluster --name pharma-qa-cluster
    #   --query 'cluster.endpoint' --output text
    namespace: qa                  # ← dev → qa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true               # ← ADDED in qa
      # selfHeal: if someone manually changes a resource
      # ArgoCD reverts it back to git state automatically
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10