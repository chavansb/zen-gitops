apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: pharma
  namespace: argocd
  labels:
    managed-by: terraform
spec:
  description: Pharma microservices project

  sourceRepos:
    - "https://github.com/chavansb/zen-gitops.git"
    - "https://charts.helm.sh/stable"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://kubernetes.github.io/ingress-nginx"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: dev
    - server: https://A93BEADC50249F768742E7A35CD4FE46.sk1.us-east-1.eks.amazonaws.com
      namespace: qa
    - server: https://C3F2AAF4C9CE06EC05BF8D02793474FB.gr7.us-east-1.eks.amazonaws.com
      namespace: prod
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: false

  roles:
    - name: pharma-admin
      description: Admin role for pharma project
      policies:
        - p, proj:pharma:pharma-admin, applications, *, pharma/*, allow
      groups:
        - pharma-devops-team
